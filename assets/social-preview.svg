<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="0">
      <stop offset="0%" stop-color="#6C47FF"/>
      <stop offset="100%" stop-color="#9B7DFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="white" stroke-width="1"/>
  </g>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="640" fill="url(#accent)"/>

  <!-- Sound wave icon -->
  <g transform="translate(100, 200)">
    <rect x="0" y="60" width="12" height="80" rx="6" fill="#6C47FF"/>
    <rect x="24" y="30" width="12" height="140" rx="6" fill="#6C47FF"/>
    <rect x="48" y="0" width="12" height="200" rx="6" fill="#6C47FF"/>
    <rect x="72" y="40" width="12" height="120" rx="6" fill="#6C47FF"/>
    <rect x="96" y="70" width="12" height="60" rx="6" fill="#6C47FF"/>
  </g>

  <!-- Title -->
  <text x="260" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">ElevenLabs Agent</text>
  <text x="260" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#6C47FF">Toolkit</text>

  <!-- Subtitle -->
  <text x="260" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#888888">Production-ready templates, checklists, and code examples</text>
  <text x="260" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#888888">for building voice AI agents.</text>

  <!-- Stats pills -->
  <g transform="translate(260, 490)">
    <rect x="0" y="0" width="150" height="36" rx="18" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
    <text x="75" y="23" font-family="system-ui, sans-serif" font-size="14" fill="#ccc" text-anchor="middle">5 Templates</text>

    <rect x="170" y="0" width="150" height="36" rx="18" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
    <text x="245" y="23" font-family="system-ui, sans-serif" font-size="14" fill="#ccc" text-anchor="middle">5 Checklists</text>

    <rect x="340" y="0" width="180" height="36" rx="18" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
    <text x="430" y="23" font-family="system-ui, sans-serif" font-size="14" fill="#ccc" text-anchor="middle">3 Frameworks</text>

    <rect x="540" y="0" width="150" height="36" rx="18" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
    <text x="615" y="23" font-family="system-ui, sans-serif" font-size="14" fill="#ccc" text-anchor="middle">4 Tool Examples</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1280" height="20" fill="#6C47FF" opacity="0.3"/>
</svg>
